# Strategy + risk configuration for the JJ NY-session strategy bot.

strategy:
  timezone: "America/New_York"
  session_open: "09:30"          # anchor candle
  continuation_end_minutes: 10   # phase 1: 0-10 min after open
  reversion_end_minutes: 90      # phase 2: 10-90 min after open
  hard_cutoff: "11:00"           # no new entries after this time regardless of phase
  min_extension_points: 12       # min move away from open before a reversion trade is valid
  displacement_size_ratio: 1.15  # candle range must be >= this * avg(range, lookback)
  displacement_prev_ratio: 1.0   # candle range must be >= this * previous candle range
  max_wick_ratio: 0.30           # (total wick) / range must be <= this to count as displacement
  structure_lookback: 30         # minutes to look back for swing high/low ("structure")
  swing_strength: 2              # bars on each side required to confirm a pivot
  break_buffer_points: 1.0       # close must clear structure by this much to avoid noise breaks

risk:
  # Reverted from the AI-Optimize "Row #1" geometry (45pt/35pt on 3 contracts):
  # that config's $2,700 max single-trade loss exceeded the real Topstep
  # trailing drawdown limit ($2,000 below), meaning a single loss would
  # guaranteed-bust the eval. This 25pt/38pt/2-contract sizing is deliberately
  # designed around the real account numbers: $1,000 loss x 2 losing days =
  # exactly the $2,000 drawdown limit; $1,520 gain x 2 winning days = $3,040,
  # clearing the $3,000 profit target with margin. Per user instruction.
  #
  # NOTE on Topstep's Consistency Target: best single day must stay <=50% of
  # the $3,000 profit target ($1,500) or "the Profit Target increases" —
  # confirmed this does NOT fail the account, it's a soft constraint, not a
  # bust condition. $1,520 slightly exceeds $1,500 (per user's own
  # confirmation from a Topstep trader — small overage accounts for fees).
  # The exact escalation formula (how much the target increases) is NOT
  # currently known or modeled — confirm with Topstep before assuming 2
  # winning days still cleanly passes under a raised target.
  stop_points: 25
  target_points: 38              # ~1:1.5 R:R as in the video
  max_trades_per_day: 1          # one trade per account per day, per user instruction
  stop_after_consecutive_losses: 2
  contracts_per_trade: 2         # 25pts=-$1000, 38pts=+$1520 at $20/point — never 1 contract
  # Daily rate limiter: stop trading for the day once running P&L touches
  # either cap. Sized to the real Topstep account rules above.
  daily_profit_cap: 1520
  daily_loss_cap: 1000

instrument:
  symbol: "NQ"                   # Nasdaq-100 e-mini futures, front month resolved at runtime
  tick_size: 0.25
  tick_value: 5.0                # USD per tick, NQ

topstep_eval:                    # used only by the backtester's prop-firm-style simulation
  account_size: 50000
  profit_target: 3000
  trailing_max_drawdown: 2000
  daily_loss_limit: null         # set if your eval enforces one
